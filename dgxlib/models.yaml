# Per-model DGX request behavior registry.
#
# This is the one place that encodes how each model served on the Spark wants to
# be called. Edit it in the same breath as the spin-up-vllm-*.sh script that
# serves a model — a model swap should be a one-line change here, never code.
#
# Thinking is (model capability) x (call intent):
#   - can_think        : does this model support a reasoning/thinking template at all
#   - thinking_default : when a caller does NOT specify, think or not?
# A call site may override with thinking=True/False; the override is honored only
# if can_think is true, otherwise thinking is forced off.
#
# Keys are the exact model id advertised by GET /v1/models (what vLLM serves).
# `match` entries are prefix fallbacks used when no exact id matches.
# Unknown models fall through to `default`.
#
# Timeouts: the client STREAMS, so the active budget is `idle_timeout` — the max
# seconds with no token streamed (covers both queue admission and inter-token
# stalls). A slow-but-steady generation that keeps emitting tokens is never
# killed by it (only max_tokens bounds total length). `read_timeout` is the
# legacy total-response budget, kept for back-compat and as the default for
# idle_timeout when a model omits it. Set idle_timeout small to fail dead/queued
# slots fast; keep it large only where queue admission is legitimately long.

default:
  can_think: false
  thinking_default: false
  read_timeout: 300        # seconds; legacy total-response budget (back-compat)
  idle_timeout: 120        # seconds with no streamed token -> fail fast
  max_tokens: 16384        # generous floor; reasoning models can burn a lot

models:
  "Qwen/Qwen3.5-122B-A10B-FP8":
    # Cross-box TP=2 on the Spark: ~20 tok/s single-stream, slower under
    # concurrent load. A full 20k-token completion (pdf-translators' budget)
    # legitimately needs >10 min. Under heavy batch load (max-num-seqs=35
    # saturated), a request can wait in vLLM's queue up to ~800s before even
    # starting, then another ~800s to generate — total >1200s. 1h covers the
    # worst case without masking true outages (connection errors are immediate).
    # Streaming makes read_timeout mostly moot, but this box can sit ~800s in the
    # queue before its first token, so keep a generous idle budget: only a slot
    # that's truly dead (no token for 15 min) should be failed here.
    can_think: true
    thinking_default: false
    read_timeout: 3600
    idle_timeout: 900

  "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8":
    # A3B (3B active) streams quickly once admitted; 120s of silence means the
    # slot is wedged or queued behind a saturated box, not legitimately slow.
    # Old behavior: a stuck chunk cost the full 600s before being skipped.
    can_think: true
    thinking_default: false
    read_timeout: 600
    idle_timeout: 120

  "Qwen/Qwen2.5-14B-Instruct-AWQ":
    can_think: false
    thinking_default: false

match:
  # Prefix fallbacks (longest match wins) for slots whose exact id isn't listed.
  "Qwen/Qwen3":
    can_think: true
    thinking_default: false
    read_timeout: 600
    idle_timeout: 120
